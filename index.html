<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Career Jobs Portal</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://sad.adsgram.ai/js/sad.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', sans-serif;
  background: #f0f4ff;
  color: #1a1a2e;
}
.header {
  background: linear-gradient(135deg, #003399, #0055cc);
  color: white;
  padding: 20px;
  text-align: center;
}
.header h1 { font-size: 22px; }
.header p { font-size: 12px; opacity: 0.8; margin-top: 4px; }
.search-box {
  padding: 15px;
  background: white;
  border-bottom: 1px solid #eee;
}
.search-box input {
  width: 100%;
  padding: 10px 15px;
  border: 2px solid #003399;
  border-radius: 25px;
  font-size: 14px;
  outline: none;
}
.filter-tabs {
  display: flex;
  gap: 8px;
  padding: 12px 15px;
  overflow-x: auto;
  background: white;
  border-bottom: 1px solid #eee;
}
.filter-tab {
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid #003399;
  color: #003399;
  font-size: 12px;
  white-space: nowrap;
  cursor: pointer;
  background: white;
}
.filter-tab.active {
  background: #003399;
  color: white;
}
.jobs-list { padding: 15px; }
.job-card {
  background: white;
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  border-left: 4px solid #003399;
}
.job-card .company {
  font-size: 11px;
  color: #003399;
  font-weight: 600;
  text-transform: uppercase;
}
.job-card .title {
  font-size: 15px;
  font-weight: 700;
  margin: 4px 0;
  color: #1a1a2e;
}
.job-card .meta {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin: 8px 0;
}
.job-card .tag {
  background: #f0f4ff;
  color: #003399;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 11px;
}
.job-card .salary {
  color: #008000;
  font-weight: 600;
  font-size: 13px;
}
.download-btn {
  width: 100%;
  padding: 10px;
  background: linear-gradient(135deg, #003399, #0055cc);
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 10px;
}
.download-btn:active { opacity: 0.8; }
.ad-modal {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.85);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}
.ad-modal.show { display: flex; }
.ad-box {
  background: white;
  border-radius: 16px;
  padding: 30px 20px;
  text-align: center;
  width: 90%;
  max-width: 340px;
}
.ad-box h3 {
  color: #003399;
  font-size: 18px;
  margin-bottom: 8px;
}
.ad-box p {
  color: #666;
  font-size: 13px;
  margin-bottom: 20px;
}
.watch-btn {
  width: 100%;
  padding: 14px;
  background: #003399;
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
}
.watch-btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}
.cancel-btn {
  margin-top: 10px;
  background: none;
  border: none;
  color: #999;
  font-size: 13px;
  cursor: pointer;
  padding: 8px;
}
.loading {
  text-align: center;
  padding: 40px;
  color: #666;
}
</style>
</head>
<body>

<div class="header">
  <h1>Career Jobs Portal</h1>
  <p>Latest Govt & IT Jobs | Placement Guides | Study Material</p>
</div>

<div class="search-box">
  <input type="text"
    placeholder="Search jobs, companies..."
    id="searchInput"
    oninput="filterJobs()"
  />
</div>

<div class="filter-tabs">
  <button class="filter-tab active"
    onclick="filterByType('all', this)">All Jobs</button>
  <button class="filter-tab"
    onclick="filterByType('it', this)">IT Jobs</button>
  <button class="filter-tab"
    onclick="filterByType('govt', this)">Govt Jobs</button>
  <button class="filter-tab"
    onclick="filterByType('fresher', this)">Freshers</button>
  <button class="filter-tab"
    onclick="filterByType('placement', this)">Placement</button>
</div>

<div class="jobs-list" id="jobsList">
  <div class="loading">Loading latest jobs...</div>
</div>

<!-- Ad Modal -->
<div class="ad-modal" id="adModal">
  <div class="ad-box">
    <h3>Unlock Full Guide</h3>
    <p>Watch a short 5-second video to download
    the complete Job Guide PDF with Resume Tips
    & Interview Questions</p>
    <button class="watch-btn"
      id="watchBtn"
      onclick="watchAd()">
      Watch & Download (5 sec)
    </button>
    <button class="cancel-btn"
      onclick="closeModal()">
      Cancel
    </button>
  </div>
</div>

<script>
// ── Telegram WebApp Init ──
const tg = window.Telegram.WebApp;
tg.expand();
tg.ready();

// ── AdsGram Init ──
let AdController = null;
document.addEventListener('DOMContentLoaded', function() {
  try {
    AdController = window.Adsgram.init({
      blockId: "30144",
      debug: false
    });
    console.log('AdsGram initialized');
  } catch(e) {
    console.log('AdsGram init error:', e);
  }
});

let currentPdfUrl = '';
let allJobs = [];

// ── Load Jobs from GitHub ──
async function loadJobs() {
  try {
    const response = await fetch(
      'https://api.github.com/repos/pavan200212345/sarkari-scheme-alert/contents/',
      {
        headers: {
          'Accept': 'application/vnd.github.v3+json'
        }
      }
    );
    const files = await response.json();
    const pdfs = files.filter(f => f.name.endsWith('.pdf'));

    if (pdfs.length === 0) {
      showDefaultJobs();
      return;
    }

    allJobs = pdfs.map((pdf, i) => ({
      title: formatTitle(pdf.name),
      company: getCompany(pdf.name),
      salary: getSalary(i),
      location: 'PAN India',
      experience: 'Freshers / 0-3 years',
      type: getJobType(pdf.name),
      url: pdf.download_url,
      date: 'New'
    }));

    renderJobs(allJobs);
  } catch(e) {
    console.log('Load error:', e);
    showDefaultJobs();
  }
}

function formatTitle(filename) {
  let name = filename
    .replace('.pdf', '')
    .replace(/_/g, ' ')
    .replace(/job \d+ \d+/gi, '')
    .trim()
    .toUpperCase();
  return name || 'Job Notification 2026';
}

function getCompany(filename) {
  const companies = [
    'TCS', 'Infosys', 'Wipro', 'Accenture',
    'Cognizant', 'HCL', 'SSC', 'Railway',
    'IBPS', 'Qualcomm', 'Amazon', 'Google'
  ];
  for(let c of companies) {
    if(filename.toUpperCase().includes(c))
      return c;
  }
  return 'Multiple Companies';
}

function getSalary(index) {
  const salaries = [
    '3.5 - 7 LPA',
    '3.6 LPA',
    'Rs.25000 - 35000/month',
    '4 - 8 LPA',
    'Rs.19900 - 35400/month'
  ];
  return salaries[index % salaries.length];
}

function getJobType(filename) {
  const fn = filename.toLowerCase();
  if(fn.includes('ssc') ||
     fn.includes('railway') ||
     fn.includes('ibps') ||
     fn.includes('govt') ||
     fn.includes('sarkari')) return 'govt';
  if(fn.includes('tcs') ||
     fn.includes('infosys') ||
     fn.includes('wipro') ||
     fn.includes('tech') ||
     fn.includes('it')) return 'it';
  return 'fresher';
}

function renderJobs(jobs) {
  const container = document.getElementById('jobsList');
  if(jobs.length === 0) {
    container.innerHTML =
      '<div class="loading">No jobs found</div>';
    return;
  }
  container.innerHTML = jobs.map(job => `
    <div class="job-card" data-type="${job.type}">
      <div class="company">${job.company}</div>
      <div class="title">${job.title}</div>
      <div class="meta">
        <span class="tag">${job.experience}</span>
        <span class="tag">${job.location}</span>
        <span class="tag">${job.date}</span>
      </div>
      <div class="salary">Salary: ${job.salary}</div>
      <button class="download-btn"
        onclick="openAdModal('${job.url}')">
        Download Full Guide + Apply
      </button>
    </div>
  `).join('');
}

function showDefaultJobs() {
  allJobs = [
    {
      title: 'TCS Off Campus Hiring 2026',
      company: 'TCS',
      salary: '3.5 - 7 LPA',
      location: 'PAN India',
      experience: 'Freshers / 0-2 years',
      type: 'it',
      url: 'https://www.tcs.com/careers',
      date: 'New'
    },
    {
      title: 'SSC CGL 2026 - 17000 Posts',
      company: 'SSC',
      salary: 'Rs.25000 - 151100/month',
      location: 'PAN India',
      experience: 'Any Graduate',
      type: 'govt',
      url: 'https://ssc.nic.in',
      date: 'New'
    },
    {
      title: 'Infosys System Engineer 2026',
      company: 'Infosys',
      salary: '3.6 LPA',
      location: 'Bangalore / Pune',
      experience: 'Freshers',
      type: 'fresher',
      url: 'https://www.infosys.com/careers',
      date: 'New'
    },
    {
      title: 'Wipro National Qualifier Test 2026',
      company: 'Wipro',
      salary: '3.5 LPA',
      location: 'Multiple Cities',
      experience: 'Freshers',
      type: 'fresher',
      url: 'https://www.wipro.com/careers',
      date: 'New'
    },
    {
      title: 'Railway RRB NTPC 2026 - 11558 Posts',
      company: 'Railway',
      salary: 'Rs.19900 - 35400/month',
      location: 'PAN India',
      experience: '12th / Graduate',
      type: 'govt',
      url: 'https://www.rrbcdg.gov.in',
      date: 'New'
    }
  ];
  renderJobs(allJobs);
}

function filterJobs() {
  const query = document.getElementById(
    'searchInput').value.toLowerCase();
  const filtered = allJobs.filter(j =>
    j.title.toLowerCase().includes(query) ||
    j.company.toLowerCase().includes(query)
  );
  renderJobs(filtered);
}

function filterByType(type, btn) {
  document.querySelectorAll('.filter-tab')
    .forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if(type === 'all') {
    renderJobs(allJobs);
  } else {
    renderJobs(allJobs.filter(j => j.type === type));
  }
}

// ── Ad Modal Functions ──
function openAdModal(pdfUrl) {
  currentPdfUrl = pdfUrl;
  if(AdController) {
    document.getElementById('adModal')
      .classList.add('show');
  } else {
    // AdsGram not available open PDF directly
    window.open(pdfUrl, '_blank');
  }
}

function closeModal() {
  document.getElementById('adModal')
    .classList.remove('show');
}

function watchAd() {
  const btn = document.getElementById('watchBtn');
  btn.textContent = 'Loading Ad...';
  btn.disabled = true;

  AdController.show()
    .then((result) => {
      console.log('Ad watched successfully');
      closeModal();
      window.open(currentPdfUrl, '_blank');
    })
    .catch((error) => {
      console.log('Ad error - opening PDF anyway');
      closeModal();
      window.open(currentPdfUrl, '_blank');
    })
    .finally(() => {
      btn.textContent = 'Watch & Download (5 sec)';
      btn.disabled = false;
    });
}

// ── Start ──
loadJobs();
</script>
</body>
</html>
