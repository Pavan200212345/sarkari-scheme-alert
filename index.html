<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Career Jobs Portal</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://sad.adsgram.ai/js/sad.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', sans-serif;
  background: #f0f4ff;
  color: #1a1a2e;
  min-height: 100vh;
}
.header {
  background: linear-gradient(135deg, #003399, #0055cc);
  color: white;
  padding: 16px 20px;
  text-align: center;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header h1 { font-size: 18px; font-weight: 700; }
.header p {
  font-size: 11px;
  opacity: 0.8;
  margin-top: 3px;
}
.search-box {
  padding: 10px 15px;
  background: white;
  border-bottom: 1px solid #eee;
}
.search-box input {
  width: 100%;
  padding: 9px 15px;
  border: 2px solid #003399;
  border-radius: 25px;
  font-size: 13px;
  outline: none;
}
.filter-tabs {
  display: flex;
  gap: 8px;
  padding: 8px 15px;
  overflow-x: auto;
  background: white;
  border-bottom: 1px solid #eee;
  scrollbar-width: none;
}
.filter-tabs::-webkit-scrollbar { display: none; }
.filter-tab {
  padding: 5px 12px;
  border-radius: 20px;
  border: 1.5px solid #003399;
  color: #003399;
  font-size: 11px;
  white-space: nowrap;
  cursor: pointer;
  background: white;
  font-weight: 600;
}
.filter-tab.active {
  background: #003399;
  color: white;
}
.ad-banner {
  width: 100%;
  background: #fff;
  padding: 8px 12px;
  border-bottom: 1px solid #eee;
}
.ad-banner a {
  display: block;
  background: linear-gradient(
    135deg, #fff3cd, #ffe8a1
  );
  border: 1.5px solid #ffc107;
  border-radius: 8px;
  padding: 10px 12px;
  text-decoration: none;
  color: #856404;
  font-size: 12px;
  font-weight: 700;
  text-align: center;
  line-height: 1.5;
}
.ad-banner a:active { opacity: 0.8; }
.jobs-list { padding: 12px; }
.job-card {
  background: white;
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  border-left: 4px solid #003399;
}
.job-card:active { opacity: 0.95; }
.card-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 4px;
}
.company-name {
  font-size: 12px;
  color: #003399;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.badge-new {
  background: #ff4444;
  color: white;
  padding: 2px 7px;
  border-radius: 10px;
  font-size: 9px;
  font-weight: 700;
}
.job-title {
  font-size: 14px;
  font-weight: 700;
  color: #1a1a2e;
  line-height: 1.3;
  margin: 4px 0 6px;
}
.job-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-bottom: 6px;
}
.tag {
  background: #f0f4ff;
  color: #003399;
  padding: 2px 9px;
  border-radius: 10px;
  font-size: 10px;
  font-weight: 600;
}
.salary {
  color: #008000;
  font-weight: 700;
  font-size: 12px;
  margin-bottom: 8px;
}
.download-btn {
  width: 100%;
  padding: 10px;
  background: linear-gradient(135deg, #003399, #0055cc);
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
}
.download-btn:active { opacity: 0.85; }
.ad-modal {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.88);
  z-index: 1000;
  align-items: center;
  justify-content: center;
}
.ad-modal.show { display: flex; }
.ad-box {
  background: white;
  border-radius: 20px;
  padding: 28px 22px;
  text-align: center;
  width: 88%;
  max-width: 340px;
}
.ad-icon { font-size: 36px; margin-bottom: 10px; }
.ad-box h3 {
  color: #003399;
  font-size: 18px;
  margin-bottom: 8px;
  font-weight: 700;
}
.ad-box p {
  color: #666;
  font-size: 12px;
  margin-bottom: 20px;
  line-height: 1.5;
}
.watch-btn {
  width: 100%;
  padding: 13px;
  background: linear-gradient(135deg, #003399, #0055cc);
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
}
.watch-btn:disabled { opacity: 0.6; }
.cancel-btn {
  margin-top: 10px;
  background: none;
  border: none;
  color: #aaa;
  font-size: 12px;
  cursor: pointer;
  padding: 8px;
  width: 100%;
}
.loading {
  text-align: center;
  padding: 40px 20px;
  color: #888;
  font-size: 13px;
}
.spinner {
  width: 36px; height: 36px;
  border: 3px solid #f0f4ff;
  border-top: 3px solid #003399;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="header">
  <h1>Career Jobs Portal</h1>
  <p>Govt & IT Jobs | Placement Guides | Study Material</p>
</div>

<div class="search-box">
  <input type="text"
    placeholder="Search jobs, companies..."
    id="searchInput"
    oninput="filterJobs()"
  />
</div>

<div class="filter-tabs">
  <button class="filter-tab active"
    onclick="filterByType('all',this)">All Jobs</button>
  <button class="filter-tab"
    onclick="filterByType('it',this)">IT Jobs</button>
  <button class="filter-tab"
    onclick="filterByType('govt',this)">Govt Jobs</button>
  <button class="filter-tab"
    onclick="filterByType('fresher',this)">Freshers</button>
  <button class="filter-tab"
    onclick="filterByType('placement',this)">Placement</button>
</div>

<!-- Adsterra Banner -->
<div class="ad-banner">
  <a href="https://www.profitablecpmratenetwork.com/epf1h2nk?key=ca7914ca665a338eae3a958326e74b78"
    target="_blank">
    🔥 FREE Download: Placement Study Material,
    Interview Questions & Resume Templates
    → Click Here ←
  </a>
</div>

<div class="jobs-list" id="jobsList">
  <div class="loading">
    <div class="spinner"></div>
    Loading latest jobs...
  </div>
</div>

<!-- Ad Modal -->
<div class="ad-modal" id="adModal">
  <div class="ad-box">
    <div class="ad-icon">🎬</div>
    <h3>Unlock Full Guide</h3>
    <p>Watch a short 5-second video to download
    the complete Job Guide PDF!</p>
    <button class="watch-btn"
      id="watchBtn" onclick="watchAd()">
      ▶ Watch & Download (5 sec)
    </button>
    <button class="cancel-btn"
      onclick="closeModal()">Cancel</button>
  </div>
</div>

<script>
// Telegram Init
const tg = window.Telegram &&
  window.Telegram.WebApp
  ? window.Telegram.WebApp : null;
if(tg) { tg.expand(); tg.ready(); }

// AdsGram Init
let AdController = null;
window.addEventListener('load', function() {
  try {
    if(window.Adsgram) {
      AdController = window.Adsgram.init({
        blockId: "30144",
        debug: false
      });
      console.log('AdsGram ready');
    }
  } catch(e) {
    console.log('AdsGram error:', e);
  }
});

let currentPdfUrl = '';
let allJobs = [];

async function loadJobs() {
  try {
    const res = await fetch(
      'https://api.github.com/repos/' +
      'pavan200212345/sarkari-scheme-alert/contents/',
      { headers: {
        'Accept': 'application/vnd.github.v3+json'
      }}
    );
    const files = await res.json();
    const pdfs = files.filter(f =>
      f.name.endsWith('.pdf')
    );

    if(pdfs.length === 0) {
      showDefaultJobs(); return;
    }

    allJobs = pdfs.map((pdf, i) => ({
      title: formatTitle(pdf.name),
      company: getCompany(pdf.name),
      salary: getSalary(i),
      location: 'PAN India',
      experience: 'Freshers / 0-3 years',
      type: getJobType(pdf.name),
      url: pdf.download_url,
    }));

    renderJobs(allJobs);
  } catch(e) {
    showDefaultJobs();
  }
}

function formatTitle(filename) {
  return filename
    .replace('.pdf','')
    .replace(/_/g,' ')
    .replace(/job \d+ \d+/gi,'')
    .trim().toUpperCase() || 'Job Notification 2026';
}

function getCompany(filename) {
  const cos = [
    'TCS','INFOSYS','WIPRO','ACCENTURE',
    'COGNIZANT','HCL','SSC','RAILWAY',
    'IBPS','QUALCOMM','AMAZON','GOOGLE',
    'MICROSOFT','DELOITTE','CAPGEMINI',
    'ORACLE','SAMSUNG','INTEL'
  ];
  const fn = filename.toUpperCase();
  for(let c of cos) {
    if(fn.includes(c)) return c;
  }
  return 'Multiple Companies';
}

function getSalary(i) {
  return [
    '3.5 - 7 LPA',
    '3.6 LPA',
    'Rs.25,000 - 35,000/mo',
    '4 - 8 LPA',
    'Rs.19,900 - 35,400/mo'
  ][i % 5];
}

function getJobType(filename) {
  const fn = filename.toLowerCase();
  if(fn.includes('ssc')||fn.includes('railway')||
     fn.includes('ibps')||fn.includes('rrb')||
     fn.includes('govt')||fn.includes('sarkari'))
    return 'govt';
  if(fn.includes('tcs')||fn.includes('infosys')||
     fn.includes('wipro')||fn.includes('tech')||
     fn.includes('software')||fn.includes('it'))
    return 'it';
  return 'fresher';
}

function renderJobs(jobs) {
  const c = document.getElementById('jobsList');
  if(!jobs.length) {
    c.innerHTML =
      '<div class="loading">No jobs found</div>';
    return;
  }
  c.innerHTML = jobs.map(job => `
    <div class="job-card" data-type="${job.type}">
      <div class="card-top">
        <div class="company-name">${job.company}</div>
        <span class="badge-new">NEW</span>
      </div>
      <div class="job-title">${job.title}</div>
      <div class="job-meta">
        <span class="tag">${job.experience}</span>
        <span class="tag">${job.location}</span>
      </div>
      <div class="salary">Salary: ${job.salary}</div>
      <button class="download-btn"
        onclick="openAdModal('${job.url}')">
        Download Full Guide + Apply
      </button>
    </div>
  `).join('');
}

function showDefaultJobs() {
  allJobs = [
    { title:'TCS Off Campus 2026',
      company:'TCS', salary:'3.5-7 LPA',
      location:'PAN India',
      experience:'Freshers/0-2 yrs',
      type:'it',
      url:'https://www.tcs.com/careers' },
    { title:'SSC CGL 2026 - 17000 Posts',
      company:'SSC',
      salary:'Rs.25,000-1,51,100/mo',
      location:'PAN India',
      experience:'Any Graduate',
      type:'govt',
      url:'https://ssc.nic.in' },
    { title:'Infosys System Engineer 2026',
      company:'INFOSYS', salary:'3.6 LPA',
      location:'Bangalore/Pune',
      experience:'Freshers',
      type:'fresher',
      url:'https://www.infosys.com/careers' },
    { title:'Wipro NQT 2026',
      company:'WIPRO', salary:'3.5 LPA',
      location:'Multiple Cities',
      experience:'Freshers',
      type:'fresher',
      url:'https://www.wipro.com/careers' },
    { title:'Railway RRB NTPC 2026',
      company:'RAILWAY',
      salary:'Rs.19,900-35,400/mo',
      location:'PAN India',
      experience:'12th/Graduate',
      type:'govt',
      url:'https://www.rrbcdg.gov.in' }
  ];
  renderJobs(allJobs);
}

function filterJobs() {
  const q = document.getElementById(
    'searchInput').value.toLowerCase();
  renderJobs(allJobs.filter(j =>
    j.title.toLowerCase().includes(q) ||
    j.company.toLowerCase().includes(q)
  ));
}

function filterByType(type, btn) {
  document.querySelectorAll('.filter-tab')
    .forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderJobs(type==='all' ? allJobs :
    allJobs.filter(j => j.type===type));
}

function openAdModal(pdfUrl) {
  currentPdfUrl = pdfUrl;
  const isTG = tg && tg.initData &&
    tg.initData.length > 0;
  if(AdController && isTG) {
    document.getElementById('adModal')
      .classList.add('show');
  } else {
    window.open(pdfUrl, '_blank');
  }
}

function closeModal() {
  document.getElementById('adModal')
    .classList.remove('show');
}

function watchAd() {
  const btn = document.getElementById('watchBtn');
  btn.textContent = 'Loading...';
  btn.disabled = true;

  if(!AdController) {
    closeModal();
    window.open(currentPdfUrl, '_blank');
    btn.textContent = '▶ Watch & Download (5 sec)';
    btn.disabled = false;
    return;
  }

  AdController.show()
    .then(() => {
      closeModal();
      window.open(currentPdfUrl, '_blank');
    })
    .catch(() => {
      closeModal();
      window.open(currentPdfUrl, '_blank');
    })
    .finally(() => {
      btn.textContent = '▶ Watch & Download (5 sec)';
      btn.disabled = false;
    });
}

loadJobs();
</script>
</body>
</html>
